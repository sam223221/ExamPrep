services:
  ingest:
    build: .
    profiles: ["ingest"]
    volumes:
      - ./:/data/pdfs:ro
      - ./study-guide:/data/study-guide:ro
      - chroma:/data/chroma_db
    command: ["python", "-m", "app.ingest"]

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - chroma:/data/chroma_db
      - ./:/data/pdfs:ro          # read-only access to source PDFs for slide rendering
      - slides:/data/slides        # disk cache for rendered slide images
    restart: unless-stopped

volumes:
  chroma:
  slides:
